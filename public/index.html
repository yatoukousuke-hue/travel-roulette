<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>旅行先ルーレット</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <header class="app-header">
    <div>
      <p class="eyebrow">Japan Travel Roulette</p>
      <h1>旅行先ルーレット</h1>
      <p>条件を選んで、次のお出かけ先を楽しく決める。</p>
    </div>
    <div class="header-meter" aria-hidden="true">
      <span></span><span></span><span></span><span></span>
    </div>
  </header>

  <nav class="tabs" aria-label="画面切り替え">
    <button class="tab-button active" data-tab="prefecture">都道府県ルーレット</button>
    <button class="tab-button" data-tab="municipality">市区町村ルーレット</button>
    <button class="tab-button" data-tab="favorites">お気に入り</button>
    <button class="tab-button" data-tab="history">履歴</button>
  </nav>

  <main>
    <section class="tab-panel active" id="tab-prefecture">
      <div class="workspace">
        <section class="control-panel">
          <h2>都道府県を抽選</h2>
          <label class="field">
            <span>抽選範囲</span>
            <select id="pref-filter-type">
              <option value="all">全国すべて</option>
              <option value="region">地方で絞る</option>
              <option value="custom">都道府県を複数選択</option>
            </select>
          </label>
          <label class="field" id="region-field">
            <span>地方</span>
            <select id="region-select"></select>
          </label>
          <div class="field" id="custom-pref-field">
            <span>候補にする都道府県</span>
            <div class="checkbox-grid" id="custom-pref-list"></div>
          </div>
          <div class="shared-controls" id="pref-shared-controls"></div>
          <button class="primary-action" id="spin-pref">ルーレットを回す</button>
        </section>
        <section class="result-panel" id="pref-result-panel"></section>
      </div>
    </section>

    <section class="tab-panel" id="tab-municipality">
      <div class="workspace">
        <section class="control-panel">
          <h2>市区町村を抽選</h2>
          <label class="field">
            <span>都道府県</span>
            <select id="municipality-pref-select"></select>
          </label>
          <p class="hint" id="municipality-count"></p>
          <div class="shared-controls" id="municipality-shared-controls"></div>
          <button class="primary-action" id="spin-municipality">市区町村ルーレットを回す</button>
        </section>
        <section class="result-panel" id="municipality-result-panel"></section>
      </div>
    </section>

    <section class="tab-panel" id="tab-favorites">
      <section class="list-panel">
        <div class="list-heading">
          <h2>お気に入り</h2>
          <span id="favorite-count"></span>
        </div>
        <div id="favorites-list" class="saved-list"></div>
      </section>
    </section>

    <section class="tab-panel" id="tab-history">
      <section class="list-panel">
        <div class="list-heading">
          <h2>履歴</h2>
          <button class="ghost-button danger" id="clear-history">履歴をすべて削除</button>
        </div>
        <div id="history-list" class="saved-list"></div>
      </section>
    </section>
  </main>

  <div class="toast" id="toast" role="status" aria-live="polite"></div>

  <script src="/data/prefectures.js"></script>
  <script src="/data/municipalities.js"></script>
  <script src="/script.js"></script>
</body>
</html>
